<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password | REOS</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101113;
      --panel: #181a1d;
      --line: #2a2d32;
      --text: #f4f0ea;
      --muted: #9a9590;
      --accent: #e8a838;
      --accent-dark: #c78a20;
      --danger: #e85555;
      --success: #3dcb7a;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .panel {
      width: min(100%, 440px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
    }

    .brand {
      color: var(--accent);
      font-weight: 800;
      letter-spacing: 0.08em;
      font-size: 13px;
    }

    h1 {
      margin: 8px 0 22px;
      font-size: 28px;
      line-height: 1.1;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #111316;
      color: var(--text);
      padding: 0 12px;
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232, 168, 56, 0.15);
    }

    .message {
      margin: 0 0 14px;
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 14px;
    }

    .error {
      color: #ffd3d3;
      background: rgba(232, 85, 85, 0.12);
      border: 1px solid rgba(232, 85, 85, 0.35);
    }

    .success {
      color: #d4ffe5;
      background: rgba(61, 203, 122, 0.12);
      border: 1px solid rgba(61, 203, 122, 0.35);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    button,
    .back {
      min-height: 44px;
      border-radius: var(--radius);
      font: 800 14px/1 inherit;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button {
      border: 0;
      background: var(--accent);
      color: #000;
    }

    button:hover { background: var(--accent-dark); }

    .back {
      border: 1px solid var(--line);
      color: var(--text);
      background: transparent;
    }

    @media (max-width: 520px) {
      .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="brand">REOS</div>
    <h1>Change password</h1>

    {% if error %}
      <p class="message error">{{ error }}</p>
    {% endif %}
    {% if success %}
      <p class="message success">{{ success }}</p>
    {% endif %}

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label for="current_password">Current password</label>
        <input id="current_password" name="current_password" type="password" autocomplete="current-password" required autofocus>
      </div>
      <div class="field">
        <label for="new_password">New password</label>
        <input id="new_password" name="new_password" type="password" autocomplete="new-password" minlength="8" required>
      </div>
      <div class="field">
        <label for="confirm_password">Confirm password</label>
        <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" minlength="8" required>
      </div>
      <div class="actions">
        <a class="back" href="/">Back</a>
        <button type="submit">Update</button>
      </div>
    </form>
  </main>
</body>
</html>
